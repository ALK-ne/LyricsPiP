name: iOS unsigned build

on:
  workflow_dispatch: {}
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Bake build number into project.yml
        # CURRENT_PROJECT_VERSION passed as an xcodebuild command-line
        # override does NOT reliably reach the Info.plist $(CURRENT_PROJECT_VERSION)
        # substitution in this project (confirmed: xcodebuild's own
        # "Command line invocation" echo shows the override was received,
        # but the compiled Info.plist still had CFBundleVersion=1). Baking
        # it into project.yml before generation makes it a real target
        # build setting instead, sidestepping that override-ordering issue.
        run: |
          sed -i '' "s/CURRENT_PROJECT_VERSION: \"0\"/CURRENT_PROJECT_VERSION: \"${{ github.run_number }}\"/" project.yml
          grep CURRENT_PROJECT_VERSION project.yml

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Debug - dump CURRENT_PROJECT_VERSION from generated pbxproj
        run: grep -n "CURRENT_PROJECT_VERSION" LyricsPiP.xcodeproj/project.pbxproj

      - name: List available Xcode versions
        run: ls /Applications | grep Xcode

      - name: Select latest available Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "$LATEST"
          fi
          xcodebuild -version

      - name: Build unsigned .app
        run: |
          xcodebuild \
            -project LyricsPiP.xcodeproj \
            -scheme LyricsPiP \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build

      - name: Package .ipa
        run: |
          set -e
          APP_PATH="build/Build/Products/Release-iphoneos/LyricsPiP.app"
          PAYLOAD_DIR="build/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/"
          cd build
          zip -qr LyricsPiP-unsigned.ipa Payload
          cd ..

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: LyricsPiP-unsigned-ipa
          path: build/LyricsPiP-unsigned.ipa
          retention-days: 14

  unit-tests:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest available Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "$LATEST"
          fi
          swift --version

      - name: Run LyricsPiPCore tests (swift test)
        working-directory: LyricsPiPCore
        run: swift test
