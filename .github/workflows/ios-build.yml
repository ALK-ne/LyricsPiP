name: iOS unsigned build

on:
  workflow_dispatch: {}
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List available Xcode versions
        run: ls /Applications | grep Xcode

      - name: Select latest available Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "$LATEST"
          fi
          xcodebuild -version

      - name: Build unsigned .app
        run: |
          xcodebuild \
            -project LyricsPiP.xcodeproj \
            -scheme LyricsPiP \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build

      - name: Package .ipa
        run: |
          set -e
          APP_PATH="build/Build/Products/Release-iphoneos/LyricsPiP.app"
          PAYLOAD_DIR="build/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/"
          cd build
          zip -qr LyricsPiP-unsigned.ipa Payload
          cd ..

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: LyricsPiP-unsigned-ipa
          path: build/LyricsPiP-unsigned.ipa
          retention-days: 14

  unit-tests:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest available Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "$LATEST"
          fi
          swift --version

      - name: Run LyricsPiPCore tests (swift test)
        working-directory: LyricsPiPCore
        run: swift test

  simulator-smoke-test:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Select latest available Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "$LATEST"
          fi
          xcodebuild -version

      - name: Build for Simulator
        run: |
          xcodebuild \
            -project LyricsPiP.xcodeproj \
            -scheme LyricsPiP \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath simbuild \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build

      - name: Boot Simulator, launch app, and screenshot
        run: |
          set -e
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" \
            simbuild/Build/Products/Debug-iphonesimulator/LyricsPiP.app/Info.plist)
          echo "Bundle ID: $BUNDLE_ID"

          DEVICE_ID=$(xcrun simctl create LyricsPiP-CI "iPhone 15")
          xcrun simctl boot "$DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID" -b

          xcrun simctl install "$DEVICE_ID" simbuild/Build/Products/Debug-iphonesimulator/LyricsPiP.app
          xcrun simctl launch "$DEVICE_ID" "$BUNDLE_ID"
          sleep 5

          mkdir -p screenshots
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/launch.png

          xcrun simctl shutdown "$DEVICE_ID" || true
          xcrun simctl delete "$DEVICE_ID" || true

      - name: Upload smoke-test screenshot
        uses: actions/upload-artifact@v4
        with:
          name: LyricsPiP-simulator-screenshot
          path: screenshots/launch.png
          retention-days: 14
