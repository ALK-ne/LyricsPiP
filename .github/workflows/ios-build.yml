name: iOS unsigned build

on:
  workflow_dispatch: {}
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List available Xcode versions
        run: ls /Applications | grep Xcode

      - name: Select latest available Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "$LATEST"
          fi
          xcodebuild -version

      - name: Build unsigned .app
        run: |
          xcodebuild \
            -project LyricsPiP.xcodeproj \
            -scheme LyricsPiP \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build

      - name: Set CFBundleVersion directly in the built Info.plist
        # $(CURRENT_PROJECT_VERSION) substitution during Xcode's Info.plist
        # processing does not reflect the real build setting in this project
        # for reasons that were never root-caused (confirmed via pbxproj dump,
        # xcodebuild -showBuildSettings, and reading the plist straight off
        # the runner -- all show the correct value except the final compiled
        # plist, which is always "1"). Patching the value directly into the
        # already-built Info.plist sidesteps that substitution entirely.
        run: |
          APP_INFO_PLIST="build/Build/Products/Release-iphoneos/LyricsPiP.app/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" "$APP_INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_INFO_PLIST"

      - name: Package .ipa
        run: |
          set -e
          APP_PATH="build/Build/Products/Release-iphoneos/LyricsPiP.app"
          PAYLOAD_DIR="build/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/"
          cd build
          zip -qr LyricsPiP-unsigned.ipa Payload
          cd ..

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: LyricsPiP-unsigned-ipa
          path: build/LyricsPiP-unsigned.ipa
          retention-days: 14

      - name: Publish .ipa to rolling "latest" release
        # Artifacts require a GitHub login to download, which is awkward from
        # the iPhone. A rolling prerelease gives a stable public URL that
        # Safari on the device can fetch directly and hand to SideStore.
        # NOTE: must be the tag-specific URL — the /releases/latest/ alias
        # skips prereleases and 404s:
        # https://github.com/ALK-ne/LyricsPiP/releases/download/latest/LyricsPiP-unsigned.ipa
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view latest >/dev/null 2>&1 || \
            gh release create latest --title "Latest CI build" --notes "placeholder" --prerelease
          gh release upload latest build/LyricsPiP-unsigned.ipa --clobber
          gh release edit latest \
            --title "Latest CI build (build ${{ github.run_number }})" \
            --notes "CIの最新ビルド (build ${{ github.run_number }}, commit ${{ github.sha }})。iPhoneのブラウザでLyricsPiP-unsigned.ipaをダウンロードし、共有メニューからSideStoreで開いてインストールします。"

  unit-tests:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest available Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "$LATEST"
          fi
          swift --version

      - name: Run LyricsPiPCore tests (swift test)
        working-directory: LyricsPiPCore
        run: swift test
