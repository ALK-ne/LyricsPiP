name: LyricsPiP
options:
  bundleIdPrefix: com.lyricspip
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  LyricsPiPCore:
    path: LyricsPiPCore

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
    CURRENT_PROJECT_VERSION: "0"

targets:
  LyricsPiP:
    type: application
    platform: iOS
    sources:
      - path: LyricsPiP
        excludes:
          - "**/*.plist"
          - "**/*.entitlements"
    info:
      path: LyricsPiP/App/Info.plist
      properties:
        CFBundleDisplayName: LyricsPiP
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
          - picture-in-picture
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: >-
          開発用のデバッグログを同一WiFi上のPCに送信するために使用します(任意設定)。
    entitlements:
      path: LyricsPiP/App/LyricsPiP.entitlements
      properties: {}
    dependencies:
      - package: LyricsPiPCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lyricspip.app2
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    resources:
      - LyricsPiP/Resources/Assets.xcassets
      - LyricsPiP/Resources/silence.m4a
