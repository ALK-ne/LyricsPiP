name: LyricsPiP
options:
  bundleIdPrefix: com.lyricspip
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO

targets:
  LyricsPiP:
    type: application
    platform: iOS
    sources:
      - path: LyricsPiP
        excludes:
          - "**/*.plist"
          - "**/*.entitlements"
    info:
      path: LyricsPiP/App/Info.plist
      properties:
        CFBundleDisplayName: LyricsPiP
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
          - picture-in-picture
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: LyricsPiP/App/LyricsPiP.entitlements
      properties: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lyricspip.app2
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    resources:
      - LyricsPiP/Resources/Assets.xcassets
      - LyricsPiP/Resources/silence.m4a
